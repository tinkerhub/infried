name: apply

on:
  push:
    branches: [main]

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: sync and apply
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 2222" \
            ./ deploy@187.127.143.52:/opt/infried/

          ssh -o StrictHostKeyChecking=no -p 2222 deploy@187.127.143.52 \
            "cd /opt/infried && sudo bash scripts/containers.sh"

      - name: apply vps forwarding rules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

          rsync -az \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key" \
            containers/containers.yml root@187.127.143.52:/opt/infried/containers/containers.yml

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key root@187.127.143.52 \
            "cd /opt/infried && bash scripts/vps.sh"
